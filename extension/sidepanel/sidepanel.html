<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ellyn - Email Discovery</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Ellyn</h1>
      <button id="sync-btn" class="sync-btn">↻ Sync</button>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <h2>Discover Email</h2>
      <form id="contact-form">
        <label for="firstName">First Name *</label>
        <input type="text" id="firstName" name="firstName" required placeholder="John">

        <label for="lastName">Last Name *</label>
        <input type="text" id="lastName" name="lastName" required placeholder="Doe">

        <label for="company">Company *</label>
        <input type="text" id="company" name="company" required placeholder="Acme Corp">

        <label for="role">Role</label>
        <input type="text" id="role" name="role" placeholder="CEO">

        <button type="submit" class="primary-btn">🔍 Discover Email</button>
        <div class="cost-note">Zero-cost enrichment using free APIs</div>
      </form>
    </div>

    <!-- Results Section (hidden by default) -->
    <div id="results" class="results-section" style="display: none;">
      <h2>Results</h2>

      <!-- Company Info -->
      <div class="company-info">
        <div class="info-row">
          <span class="label">Domain:</span>
          <span class="value" id="domain">-</span>
        </div>
        <div class="info-row">
          <span class="label">Industry:</span>
          <span class="value" id="industry">-</span>
        </div>
        <div class="info-row">
          <span class="label">Size:</span>
          <span class="value" id="company-size">-</span>
        </div>
      </div>

      <!-- Email Patterns -->
      <h3 style="font-size: 14px; margin-bottom: 8px;">Select Email Pattern</h3>
      <div id="email-list" class="email-list">
        <!-- Email cards will be inserted here -->
      </div>

      <!-- Actions -->
      <div class="actions">
        <button id="save-btn" class="primary-btn">💾 Save Contact</button>
        <button id="open-web-app-btn" class="secondary-btn">Open in Web App</button>
      </div>
    </div>

    <!-- Recent Contacts -->
    <div class="recent-section">
      <h3>Recent Contacts</h3>
      <div id="recent-list" class="recent-list">
        <p style="color: #9ca3af; font-size: 12px;">No recent contacts</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>100% LinkedIn compliant</span>
      <a href="http://localhost:3000" target="_blank">Open App</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../utils/storage.js"></script>
  <script src="../utils/api-client.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
