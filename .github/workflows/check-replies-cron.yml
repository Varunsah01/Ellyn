name: Check Replies Cron

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: check-replies-cron
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Skip when CRON_SECRET is missing
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET GitHub secret is not configured; skipping scheduled reply check."
            exit 0
          fi
      - name: Trigger production reply check
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --silent --show-error --max-time 600 \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: github-actions/check-replies-cron" \
            https://ellyn.vercel.app/api/cron/check-replies
